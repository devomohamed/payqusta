name: App CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/backend-ci.yml"
      - "docs/testing-strategy.md"
      - "docs/production-ops.md"
      - "docs/deployment.md"
      - "docs/environment-variables.md"
      - "docs/release-checklist.md"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/backend-ci.yml"
      - "docs/testing-strategy.md"
      - "docs/production-ops.md"
      - "docs/deployment.md"
      - "docs/environment-variables.md"
      - "docs/release-checklist.md"

jobs:
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret
      JWT_EXPIRE: 7d
      PLATFORM_ROOT_DOMAIN: payqusta.store

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Report DB-backed E2E readiness
        run: npm run test:e2e:readiness

      - name: Run backend CI test suite
        run: npm run test:ci

  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend sanity checks
        run: npm run sanity:check

      - name: Run frontend route contract checks
        run: npm run smoke:routes

      - name: Build frontend
        run: npm run build

  backend-e2e:
    if: ${{ secrets.TEST_MONGODB_URI != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret
      JWT_EXPIRE: 7d
      PLATFORM_ROOT_DOMAIN: payqusta.store
      TEST_MONGODB_URI: ${{ secrets.TEST_MONGODB_URI }}
      TEST_MONGODB_DB_NAME: payqusta_e2e_ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Confirm DB-backed E2E readiness
        run: npm run test:e2e:readiness

      - name: Run DB-backed E2E suite
        run: npm run test:e2e
